  try{ fn(S); }catch(e){ console.error("mutate fn error",e); }
  S.rev = (S.rev||0) + 1;
  if(ROOM.code){ ROOM.rev = S.rev; pushRemote(); }
  else { saveLocal(); }
  render();
}
/* read-only local change (no sync), e.g. UI-only transient */
function commit(){ if(ROOM.code){ ROOM.rev=S.rev; pushRemote(); } else saveLocal(); }

function reset(){
  if(confirm("Burn it all down and start a new reign? Profiles & scores erased.")){
    leaveRoom();
    S=BLANK(); saveLocal(); route("splash");
  }
}

/* ===================================================================== *
 * SECTION 7 — HELPERS                                                   *
 * ===================================================================== */
const $ = (h)=>{ const d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstChild; };
const app = ()=>document.getElementById("app");
function esc(s){ return (s==null?"":(""+s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
let toastT;
function toast(msg){
  const t=document.getElementById("toast"); if(!t)return; t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"), 2100);
}
const SPICE_LBL = ["","Mild 🙂","Medium 😏","Spicy 🌶️","Wild 🔥"];
const rand = (arr)=> arr.length ? arr[Math.floor(Math.random()*arr.length)] : null;
const clamp = (n,lo,hi)=> Math.max(lo, Math.min(hi, n));

/* label -> canonical tags, for a given group */
function tagsOf(labels, group){
  const src = SET_OF[group]; const set=new Set();
  (labels||[]).forEach(label=>{ const o=src.find(x=>x.label===label); if(o) o.t.forEach(t=>set.add(t)); });
  return set;
}
function limitTagsOf(player){ return tagsOf(player&&player.limits, "limits"); }
/* union of BOTH players' hard limits — the absolute lockout set */
function lockoutSet(){
  const out=new Set();
  S.players.forEach(p=>{ if(p) limitTagsOf(p).forEach(t=>out.add(t)); });
  return out;
}
function spiceCeiling(){
  const a=S.players[0], b=S.players[1];
  const sa = a?a.spice:4, sb=b?b.spice:4;
  return Math.min(sa, sb);
}

/* ===================================================================== *
 * SECTION 8 — CARD ENGINE  (array-aware filtering + weighting)          *
 * ===================================================================== */
function activePlayer(){ return S.players[S.game.turn]; }
function passivePlayer(){ return S.players[S.game.turn^1]; }

/* which decks a mode pulls from, optionally constrained by campaign phase */
function deckPoolForMode(){
  const m=S.game.mode;
  if(m==="campaign"){
    const act=S.game.campaign?S.game.campaign.act:0;
    const map=[
      ["foreplay","truth"],            // Act I — The Summons
      ["sensory","positions","truth"], // Act II — Exploration
      ["positions","quests","sensory"],// Act III — The Siege
      ["quests","wildcards","positions"]// Act IV — Coronation
    ];
    const names=map[clamp(act,0,3)];
    return names.flatMap(n=>DECKS_BY_NAME[n]);
  }
  if(m==="truthdare"){ return ALL_DECKS; } // handled specially in draw
  return ALL_DECKS; // quick, roulette: whole library
}

/* spice band a mode is allowed to draw this turn (never above ceiling) */
function spiceBandForMode(reelSpice){
  const ceil = spiceCeiling();
  if(S.game.mode==="campaign"){
    const act=S.game.campaign?S.game.campaign.act:0;
    const bands=[[1,1],[1,2],[2,3],[3,4]];
    const [lo,hi]=bands[clamp(act,0,3)];
    return {lo, hi:Math.min(hi,ceil)};
  }
  if(S.game.mode==="roulette" && reelSpice){
    const s=Math.min(reelSpice,ceil); return {lo:s, hi:s};
  }
  if(S.game.mode==="quick"){ return {lo:1, hi:ceil}; }
  return {lo:1, hi:ceil};
}

/* core eligible-cards builder. opts: {deckNames, band, allowDrawn} */
function eligibleCards(opts){
  opts = opts||{};
  const receiver=passivePlayer(), actor=activePlayer();
  const lock = lockoutSet();
  const band = opts.band || {lo:1, hi:spiceCeiling()};
  let basePool = opts.deckNames ? opts.deckNames.flatMap(n=>DECKS_BY_NAME[n]||[]) : deckPoolForMode();

  const filt = (allowDrawn)=> basePool.filter(c=>{
    if(c.spice<band.lo || c.spice>band.hi) return false;
    if(c.tags.some(t=>lock.has(t))) return false;            // HARD LIMIT lockout (both players)
    if(!allowDrawn && S.game.drawn.includes(c.text)) return false;
    return true;
  });

  let pool = filt(false);
  if(!pool.length) pool = filt(true);   // exhausted → allow repeats, limits still honored
  if(!pool.length){
    // last-resort widen the band down to 1 (still under ceiling, still limit-safe)
    pool = basePool.filter(c=> c.spice<=band.hi && !c.tags.some(t=>lock.has(t)));
  }
  return weightPool(pool, receiver, actor);
}

function weightPool(pool, receiver, actor){
  if(!pool.length) return [];
  const recvLikes = tagsOf(receiver&&receiver.receive, "receive");
  const recvSens  = tagsOf(receiver&&receiver.sensations, "sensations");
  const actorGive = tagsOf(actor&&actor.give, "give");
  const recvCurio = tagsOf(receiver&&receiver.curious, "curious");
  const actorCurio= tagsOf(actor&&actor.curious, "curious");
  const recvRole  = tagsOf(receiver&&receiver.roleplay, "roleplay");
  const weighted=[];
  pool.forEach(c=>{
    let w=1;
    if(c.tags.some(t=>recvLikes.has(t))) w+=3;
    if(c.tags.some(t=>recvSens.has(t)))  w+=2;
    if(c.tags.some(t=>actorGive.has(t))) w+=2;
    if(c.tags.some(t=>recvRole.has(t)))  w+=1;
    if(c.spice===4 && c.tags.some(t=>recvCurio.has(t)||actorCurio.has(t))) w+=4;
    w=Math.min(w,9);
    for(let i=0;i<w;i++) weighted.push(c);
  });
  return weighted.length?weighted:pool;
}

/* position challenge generator */
function drawPositionCard(band){
  const lock=lockoutSet();
  const lo=(band&&band.lo)||1, hi=(band&&band.hi)||spiceCeiling();
  let ok = POSITIONS.filter(p=> p.tier>=lo && p.tier<=hi && !p.tags.some(t=>lock.has(t)));
  if(!ok.length) ok = POSITIONS.filter(p=> p.tier<=hi && !p.tags.some(t=>lock.has(t)));
  if(!ok.length) return null;
  const receiver=passivePlayer();
  const recvCurio=tagsOf(receiver&&receiver.curious,"curious");
  const weighted=[];
  ok.forEach(p=>{ let w=1; if(p.tags.some(t=>recvCurio.has(t))) w+=3; for(let i=0;i<w;i++) weighted.push(p); });
  const P=rand(weighted);
  const verb=[,"Settle in and stay here a while — no rush to move on.",
              "Hold it for a full minute before you're allowed to speed up.",
              "Tease in this position for ninety seconds before anything more.",
              "Royal decree: don't leave this position until you've earned at least one gasp."][P.tier];
  return { deck:"positions", cat:"Position Challenge", spice:P.tier,
    pts:[,12,20,32,55][P.tier], tags:P.tags,
    text:`${P.name} — ${P.desc} ${verb}`, position:P.name, flavor:P.flavor };
}

/* set the current card into S.game; returns the card (or null) */
function drawCardInto(s, card){
  s.game.card = card || null;
  s.game.reactions = {};
  if(card && card.text && !s.game.drawn.includes(card.text)) s.game.drawn.push(card.text);
  return card;
}

/* mode-aware single draw (used by quick / campaign defaults) */
function drawForMode(s){
  const m=s.game.mode;
  if(m==="quick"){
    // dares-flavored: foreplay/wildcards/sensory + occasional truth, biased low
    const names=["foreplay","wildcards","sensory","truth"];
    const band=spiceBandForMode();
    const pool=eligibleCards({deckNames:names, band:{lo:1, hi:band.hi}});
    return drawCardInto(s, rand(pool));
  }
  if(m==="campaign"){
    const band=spiceBandForMode();
    const act=s.game.campaign?s.game.campaign.act:0;
    // Siege/Coronation get a chance at a generated position
    if(act>=2 && Math.random()<0.4){
      const pc=drawPositionCard(band);
      if(pc) return drawCardInto(s, pc);
    }
    const pool=eligibleCards({band});
    return drawCardInto(s, rand(pool));
  }
  // generic
  const pool=eligibleCards({});
  return drawCardInto(s, rand(pool));
}

/* ===================================================================== *
 * SECTION 9 — ROOM SYNC LAYER (Supabase, optional)                      *
 * ===================================================================== */
const CFG = window.SXC_CONFIG||{};
const SYNC_ENABLED = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase);
let sb=null;
if(SYNC_ENABLED){
  try{ sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY,
        { realtime:{ params:{ eventsPerSecond:5 } } }); }
  catch(e){ console.error("supabase init failed",e); }
}
const DEVICE_ID = (()=>{ let id=localStorage.getItem("sxc_device");
  if(!id){ id=(crypto.randomUUID?crypto.randomUUID():("d"+Math.random().toString(36).slice(2)+Date.now())); localStorage.setItem("sxc_device",id);} return id; })();
const CODE_ALPHABET="ABCDEFGHJKMNPQRSTUVWXYZ23456789";
const newCode=()=>Array.from({length:6},()=>CODE_ALPHABET[Math.floor(Math.random()*CODE_ALPHABET.length)]).join("");

const ROOM = { code:null, role:null, rev:-1, channel:null, poll:null, live:false };

function roomActive(){ return !!(sb && ROOM.code); }
function mySlot(){ return ROOM.role==="guest" ? 1 : 0; }
function myTurn(){ return !roomActive() ? true : S.game.turn===mySlot(); }

async function createRoom(){
  if(!sb) throw new Error("Sync not configured");
  const seed=BLANK(); seed.hostId=DEVICE_ID; seed.rev=0;
  for(let i=0;i<5;i++){
    const code=newCode();
    const { error } = await sb.from("rooms").insert({ code, host_id:DEVICE_ID, rev:0, state:seed });
    if(!error){ ROOM.code=code; ROOM.role="host"; ROOM.rev=0; S=seed; subscribe(code); return code; }
    if(error.code!=="23505") throw error;
  }
  throw new Error("Could not allocate a room code, try again.");
}
async function joinRoom(rawCode){
  if(!sb) throw new Error("Sync not configured");
  const code=(rawCode||"").trim().toUpperCase();
  if(code.length!==6) { toast("A room code is 6 characters."); return false; }
  const { data, error } = await sb.rpc("join_room", { p_code:code, p_guest:DEVICE_ID });
  if(error){ console.error(error); toast("Couldn't reach the realm. Check connection."); return false; }
  if(!data){ toast("No such room — check the code, or it may have expired."); return false; }
  ROOM.code=code; ROOM.role= (data.host_id===DEVICE_ID)?"host":"guest";
  applyRemote(data.state, data.rev); subscribe(code);
  return true;
}
function subscribe(code){
  if(!sb) return;
  try{
    ROOM.channel = sb.channel(`room:${code}`)
      .on("postgres_changes",
        { event:"UPDATE", schema:"public", table:"rooms", filter:`code=eq.${code}` },
        payload=> applyRemote(payload.new.state, payload.new.rev))
      .subscribe((status)=>{ ROOM.live = (status==="SUBSCRIBED"); render(); });
  }catch(e){ console.error("subscribe failed",e); }
  if(ROOM.poll) clearInterval(ROOM.poll);
  ROOM.poll=setInterval(pollOnce, 2500);
}
async function pollOnce(){
  if(!roomActive()) return;
  try{ const { data } = await sb.rpc("get_room", { p_code:ROOM.code }); if(data) applyRemote(data.state, data.rev); }
  catch(e){ /* offline tolerance */ }
}
function applyRemote(state, rev){
  if(rev==null || rev<=ROOM.rev) return;     // ignore stale / our own echo
  ROOM.rev=rev; S=state;
  if(!Array.isArray(S.players)) S.players=[null,null];
  while(S.players.length<2) S.players.push(null);
  render();
}
async function pushRemote(){
  if(!roomActive()) return;
  const myRev=S.rev;
  try{
    const { data, error } = await sb.from("rooms")
      .update({ state:S, rev:myRev })
      .eq("code", ROOM.code).lt("rev", myRev).select().maybeSingle();
    if(error){ toast("Sync hiccup — retrying"); return pollOnce(); }
    if(!data){ return pollOnce(); }  // lost the race → re-pull truth
    // opportunistic TTL bump
    sb.rpc("bump_expiry",{p_code:ROOM.code}).then(()=>{},()=>{});
  }catch(e){ pollOnce(); }
}
function leaveRoom(){
  if(ROOM.channel){ try{ sb.removeChannel(ROOM.channel); }catch(e){} ROOM.channel=null; }
  if(ROOM.poll){ clearInterval(ROOM.poll); ROOM.poll=null; }
  ROOM.code=null; ROOM.role=null; ROOM.rev=-1; ROOM.live=false;
}
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") pollOnce(); });

function startGame(mode, cfg){
  mutate(s=>{
    s.game.mode=mode;

    s.game._giggles=0; s.game._wasBehind=false; s.game.paused=false;
    s.game.quick=null; s.game.campaign=null; s.game.roulette=null; s.game.positions=null;
    if(mode==="quick"){
      s.game.quick={ combo:0, target:(cfg&&cfg.target)||150, freeDuel:(cfg&&cfg.freeDuel)||false,
                     truths:(cfg&&cfg.truths)||false, choosing:false };
      drawForMode(s);
    } else if(mode==="campaign"){
      s.game.campaign={ act:0, heat:0, accepts:[0,0], objMet:false, reactCount:0, finale:null };

      // handled by conqueststart -> buildBracket
    }

  else if(mode==="campaign") route("campaignplay");
  else if(mode==="roulette") route("rouletteplay");
}

/* Quick Quest timer (UI-only; not synced) */
let quickTimer=null, quickRemain=30;
function stopQuickTimer(){ if(quickTimer){ clearInterval(quickTimer); quickTimer=null; } }
function startQuickTimer(){
  stopQuickTimer(); quickRemain=30; paintRing();
  quickTimer=setInterval(()=>{
    quickRemain--; paintRing();
    if(quickRemain<=0){ stopQuickTimer(); onQuickTimeout(); }
  },1000);
}
function paintRing(){
  const el=document.getElementById("ringFill"); const txt=document.getElementById("ringTxt");
  if(!el||!txt) return;
  const C=2*Math.PI*32; const frac=clamp(quickRemain/30,0,1);
  el.style.strokeDasharray=`${C}`; el.style.strokeDashoffset=`${C*(1-frac)}`;
  el.style.stroke = quickRemain<=10? "var(--bad)" : "var(--rose)";
  txt.textContent=quickRemain;
}
function onQuickTimeout(){
  if(CURRENT!=="quickplay") return;
  mutate(s=>{ if(s.game.quick) s.game.quick.combo=0; drawForMode(s); });
  toast("⏳ Time! Combo reset. New card.");
}

const ACTS=[

  {name:"The Exploration", obj:"Both of you accept 2 cards each", need:"accepts"},
  {name:"The Siege", obj:"Fill the Heat Meter to 100", need:"heat"},
  {name:"The Coronation", obj:"Choose & complete one Finale Quest", need:"finale"},
];
function actObjectiveMet(){
  const cp=S.game.campaign; if(!cp) return false;
  const act=cp.act;
  if(act===0) return cp.reactCount>=2;
  if(act===1) return cp.accepts[0]>=2 && cp.accepts[1]>=2;
  if(act===2) return cp.heat>=100;
  if(act===3) return cp.finale && cp.finale.done;
  return false;
}

      const cp=s.game.campaign;
      cp.heat=clamp(cp.heat+heatAdd,0,100);
      if(picked.giggle||picked.gasp) cp.reactCount++;
      cp.accepts[s.game.turn]=(cp.accepts[s.game.turn]||0)+1;
      afterScore(s,picked);
      bumpCard(s);
      s.game.turn^=1;
      drawForMode(s);
    });
    toast(heatAdd?`+${heatAdd} 🔥 heat!`:"Onward.");
    route("campaignplay");
  };
  return wrap;
};

function campaignFinaleView(){

const ROUL_TARGETS=[["You give","give"],["You receive","receive"],["Wildcard","wild"]];
const ROUL_MODS=[
  {k:"mercy", ic:"😇", name:"Mercy", desc:"Half spice, half points. A breather."},
  {k:"standard", ic:"⚔️", name:"Standard", desc:"Card as drawn, normal points."},
  {k:"double", ic:"💰", name:"Double or Nothing", desc:"Wager: earn a reaction → 2× points; fail → 0 and partner steals half."},
  {k:"decree", ic:"👑", name:"Royal Decree", desc:"Spice +1 (capped), points ×1.5."},
  {k:"tribute", ic:"🎁", name:"Tribute", desc:"Partner also scores half of what you score."},
  {k:"usurp", ic:"🔁", name:"Usurp", desc:"Earn 🔥/👑 → steal 15 from partner."},
];
const SPICE_EMOJI=["","🌶️","🌶️🌶️","🌶️🌶️🌶️","🌶️🌶️🌶️🌶️"];

SCREENS.rouletteplay = ()=>{
  const r=S.game.roulette; if(!r){ route("home"); return $("<div></div>"); }
  if(roomActive() && !myTurn()) return waitingView("🎡 Roulette");
  const actor=activePlayer(), partner=passivePlayer();
  const reels=r.reels;
  const c=S.game.card;

  const wrap=$(`<div class="screen">
    <div class="row between"><div class="pill" id="home">⌂ Throne Room</div><div class="pill">🎡 Royal Roulette</div></div>
    <div class="scorebar" style="margin:10px 0 8px">
      ${miniScore(S.players[0],S.game.turn===0)}
      ${miniScore(S.players[1],S.game.turn===1)}
    </div>
    <div class="center small">First to ${r.target} glory. Variance is the point.</div>

    <div class="reels" id="reels">
      <div class="reel"><div class="rl" id="r0">${reels?SPICE_EMOJI[reels.spice]:"🎰"}</div><div class="cap">spice</div></div>

    ${reels ? `

      <div class="grid2" style="margin-top:12px">
        <button class="btn rose sm" id="accept">Accept ⚔️</button>
        <button class="btn ghost sm" id="pass">Pass (no penalty)</button>
      </div>
      <button class="btn ghost sm" id="respin" style="margin-top:10px">Spin again 🎡</button>
    ` : `
      <button class="btn rose" id="spin">SPIN THE WHEEL 🎡</button>
      <p class="center small" style="margin-top:10px">Three reels: spice × who-does-whom × a risk modifier.</p>
    `}
    <div class="footer">Hard limits locked out. Every pass is free. 🛑 safeword pauses, unscored.</div>

  wrap.querySelector("#home").onclick=()=>route("home");

  const accept=wrap.querySelector("#accept");
  if(accept){
    if(!c){ accept.disabled=true; accept.textContent="No card fit — respin"; }

  return wrap;

  function targetIcon(tk){ return tk==="give"?"🫵":tk==="receive"?"🙋":"🃏"; }
};

function doSpin(wrap){
  const reelEls=[wrap.querySelector("#r0"),wrap.querySelector("#r1"),wrap.querySelector("#r2")];
  wrap.querySelectorAll(".reel").forEach(r=>r.classList.add("rolling"));
  const ceil=spiceCeiling();
  const faces=()=>{ if(reelEls[0]) reelEls[0].textContent=SPICE_EMOJI[1+Math.floor(Math.random()*ceil)];
    if(reelEls[1]) reelEls[1].textContent=rand(["🫵","🙋","🃏"]);
    if(reelEls[2]) reelEls[2].textContent=rand(ROUL_MODS).ic; };
  const anim=setInterval(faces,80);
  setTimeout(()=>{
    clearInterval(anim);
    wrap.querySelectorAll(".reel").forEach(r=>r.classList.remove("rolling"));
    const spice=1+Math.floor(Math.random()*ceil);
    const target=rand(ROUL_TARGETS)[1];
    const mod=rand(ROUL_MODS).k;
    mutate(s=>{
      const r=s.game.roulette;
      r.reels={spice, target, mod};
      // build card by spice band
      let band={lo:spice,hi:spice};
      let card;
      if(mod==="decree"){ const sp=Math.min(spice+1,ceil); band={lo:sp,hi:sp}; }
      if(mod==="mercy"){ const sp=Math.max(1,spice-1); band={lo:sp,hi:sp}; }
      // 30% chance of a generated position card on spice>=2
      if(spice>=2 && Math.random()<0.3){ card=drawPositionCard(band); }
      if(!card){ const pool=eligibleCards({band, allowDrawn:false}); card=rand(pool) || rand(eligibleCards({band, allowDrawn:true})); }
      drawCardInto(s, card);
    });
    route("rouletteplay");
  },900);
}

function reelSummary(reels, actor, partner){
  const who = reels.target==="give" ? `${actor.crest} ${esc(actor.name)} performs on ${esc(partner.name)}`
            : reels.target==="receive" ? `${partner.crest} ${esc(partner.name)} performs on ${esc(actor.name)}`
            : `🃏 Wildcard — trailing player chooses who performs`;
  const m=ROUL_MODS.find(x=>x.k===reels.mod);
  return `${who} · ${m.ic} ${m.name}`;
}

SCREENS.roulettereact = ()=>{
  const c=S.game.card, r=S.game.roulette; const actor=activePlayer();
  if(!c||!r||!r.reels){ route("rouletteplay"); return $("<div></div>"); }
  const m=ROUL_MODS.find(x=>x.k===r.reels.mod);
  const wrap=$(`<div class="screen">
    <div style="height:8px"></div>
    <div class="panel center">
      <div class="qcat">${m.ic} ${esc(m.name)} — ${esc(m.desc)}</div>
      <h2 class="serif" style="color:var(--gold)">Tap what you earned</h2>
      <div class="react" id="react">
        ${REACTIONS.map(x=>`<div class="reactBtn" data-k="${x.key}"><b>${x.emoji}</b>${x.label} <span style="color:var(--gold)">+${x.pts}</span></div>`).join("")}
      </div>
      <button class="btn" id="finish">Resolve the wheel →</button>
    </div>
  </div>`);
  const picked={};
  wrap.querySelector("#react").onclick=e=>{ const b=e.target.closest(".reactBtn"); if(!b)return;
    const k=b.dataset.k; picked[k]=!picked[k]; b.classList.toggle("on",picked[k]); };
  wrap.querySelector("#finish").onclick=()=>{
    let msg=""; let win=false;
    mutate(s=>{
      const r2=s.game.roulette; const mod=r2.reels.mod;
      const me=s.players[s.game.turn], them=s.players[s.game.turn^1];
      let base=c.pts;
      let reactPts=0; REACTIONS.forEach(x=>{ if(picked[x.key]) reactPts+=x.pts; });
      const gotHot = picked.scream||picked.climax;
      const gotAny = picked.giggle||picked.gasp||picked.scream||picked.climax;
      let gained=0;
      if(mod==="mercy"){ gained=Math.round((base+reactPts)/2); me.score=(me.score||0)+gained; msg=`😇 Mercy: +${gained}`; }
      else if(mod==="double"){
        if(r2.wager){
          if(gotAny){ gained=(base+reactPts)*2; me.score=(me.score||0)+gained; msg=`💰 Double WIN! +${gained}`; if(c.spice===4) award(s,"lucky"); }
          else { const steal=Math.round(base/2); them.score=(them.score||0)+steal; msg=`💰 Lost the wager — ${them.name} steals ${steal}`; }
        } else { gained=base+reactPts; me.score=(me.score||0)+gained; msg=`+${gained} (no wager)`; }
      }
      else if(mod==="decree"){ gained=Math.round((base+reactPts)*1.5); me.score=(me.score||0)+gained; msg=`👑 Royal Decree: +${gained}`; }
      else if(mod==="tribute"){ gained=base+reactPts; me.score=(me.score||0)+gained; const tip=Math.round(gained/2); them.score=(them.score||0)+tip; msg=`🎁 +${gained}, ${them.name} +${tip}`; }
      else if(mod==="usurp"){ gained=base+reactPts; me.score=(me.score||0)+gained; if(gotHot){ const st=15; them.score=Math.max(0,(them.score||0)-st); msg=`🔁 +${gained}, usurped ${st} from ${them.name}!`; } else msg=`+${gained}`; }
      else { gained=base+reactPts; me.score=(me.score||0)+gained; msg=`+${gained} glory`; }

      afterScore(s, picked);
      bumpCard(s);
      // wildcard target hands next spin to trailing player
      let nextTurn = s.game.turn^1;
      if(r2.reels.target==="wild"){
        const trailing = (s.players[0].score||0) <= (s.players[1].score||0) ? 0 : 1;
        nextTurn = trailing;
      }
      s.game.turn = nextTurn;
      r2.reels=null; r2.wager=false; s.game.card=null;
      win = (me.score||0) >= r2.target;
      s.game._win=win;
    });
    toast(msg);
    if(S.game._win){ S.game._win=false; commit(); route("victory"); }
    else route("rouletteplay");
  };
  return wrap;
};

SCREENS.conqueststart = ()=>{

  wrap.querySelector("#home").onclick=()=>route("home");
  wrap.querySelector("#go").onclick=()=>{ if(!can4){ toast("Need at least 4 positions."); return; } buildBracket(size); };
  return wrap;

function buildBracket(size){
  const lock=lockoutSet(); const ceil=spiceCeiling();
  const receiver=S.players[0];
  let avail=POSITIONS.filter(p=> p.tier<=ceil && !p.tags.some(t=>lock.has(t)));
  if(avail.length<size) size=4;
  if(avail.length<4){ toast("Not enough positions for a bracket."); return; }
  // weight by curiosity of EITHER player, then sample distinct
  const curio=new Set([...tagsOf(S.players[0]&&S.players[0].curious,"curious"), ...tagsOf(S.players[1]&&S.players[1].curious,"curious")]);
  avail=avail.map(p=>({p, w: 1 + (p.tags.some(t=>curio.has(t))?2:0) + Math.random()}))
             .sort((a,b)=>b.w-a.w).map(x=>x.p);
  const seeds=avail.slice(0,size).map(p=>p.name);
  // shuffle seeding
  for(let i=seeds.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [seeds[i],seeds[j]]=[seeds[j],seeds[i]]; }
  // round 1 pairs
  const round=[]; for(let i=0;i<seeds.length;i+=2){ round.push([seeds[i], seeds[i+1]]); }
  mutate(s=>{
    s.game.mode="positions";
    resetGameMetaInto(s);
    s.game.positions={ size, rounds:[round], roundIdx:0, matchIdx:0,
      voting:false, votes:[null,null], champion:null, aligned:true, history:[] };
  });
  route("conquest");
}
function resetGameMetaInto(s){
  s.game.drawn=[]; s.game.reactions={}; s.game.reactSeen={}; s.game.cardCount=0;
  s.game._giggles=0; s.game._wasBehind=false; s.game.paused=false;
  s.game.quick=null; s.game.campaign=null; s.game.roulette=null;
}
function posByName(n){ return POSITIONS.find(p=>p.name===n); }

SCREENS.conquest = ()=>{
  const pg=S.game.positions; if(!pg){ route("home"); return $("<div></div>"); }
  if(pg.champion){ return conquestVictory(); }
  const round=pg.rounds[pg.roundIdx]; const match=round[pg.matchIdx];
  const A=posByName(match[0]), B=posByName(match[1]);
  const roundName = roundLabel(round.length, pg.size);

  // bracket visual
  const bracketHtml = pg.rounds.map((rd,ri)=>{
    return `<div class="small" style="color:var(--gold);margin-top:8px">${esc(roundLabel(rd.length,pg.size))}</div>`+
      rd.map((m,mi)=>{
        const done = ri<pg.roundIdx || (ri===pg.roundIdx && mi<pg.matchIdx);
        const cur = ri===pg.roundIdx && mi===pg.matchIdx;
        const winner = pg.history.find(h=>h.r===ri&&h.m===mi);
        const seat=(nm)=>{ if(nm==null) return `<div class="seat bye">— bye —</div>`;
          let cls="seat"; if(winner){ cls+= winner.win===nm?" win":" out"; } if(cur) cls+=" "+(cur?"":"");
          return `<div class="${cls}">${esc(nm)}</div>`; };
        return `<div class="matchrow"${cur?' style="outline:1px solid var(--rose);border-radius:14px;padding:2px"':''}>${seat(m[0])}<div class="vs">vs</div>${seat(m[1])}</div>`;
      }).join("");
  }).join("");

  if(pg.voting){
    return conquestVote(A,B);
  }

  const wrap=$(`<div class="screen">
    <div class="row between"><div class="pill" id="home">⌂ Throne Room</div><div class="pill">👑 Conquest</div></div>
    <div class="center" style="margin:6px 0"><b style="color:var(--gold)">${esc(roundName)}</b> · Match ${pg.matchIdx+1}/${round.length}</div>

    <div class="panel">
      ${matchSeat(A,"A")}
      <div class="center small" style="margin:8px 0;color:var(--rose2);font-weight:800">— versus —</div>
      ${matchSeat(B,"B")}
      <p class="small" style="margin-top:10px">Try Position A, then Position B (about a minute each — no rush). Then both of you vote.</p>
      <button class="btn rose" id="vote">We tried both — time to vote 🗳️</button>
    </div>

    <div class="bracket">${bracketHtml}</div>
    <div class="footer">No points here — you're crowning a favorite. Pass or safeword any time.</div>
  </div>`);
  wrap.querySelector("#home").onclick=()=>route("home");
  wrap.querySelector("#vote").onclick=()=>{ mutate(s=>{ s.game.positions.voting=true; s.game.positions.votes=[null,null]; }); route("conquest"); };
  return wrap;

  function matchSeat(P,letter){
    if(!P) return `<div class="codexcard bye">— bye, auto-advances —</div>`;
    return `<div class="codexcard"><div class="row between"><div class="nm">${letter}. ${esc(P.name)}</div><div class="pips">${"🌶️".repeat(P.tier)}</div></div>
      <div class="ds">${esc(P.desc)}</div><div class="fl">${esc(P.flavor)}</div></div>`;
  }
};

function conquestVote(A,B){
  const pg=S.game.positions;
  // room mode: each device votes its own slot; single device: both vote in sequence
  const wrap=$(`<div class="screen">
    <div class="row between"><div class="pill" id="home">⌂ Throne Room</div><div class="pill">🗳️ Vote</div></div>
    <div style="height:8px"></div>
    <div class="panel center">
      <h2 class="serif" style="color:var(--gold)">Cast your 🔥</h2>
      <p class="small">${roomActive()?"Each of you votes on your own phone.":"Pass the phone — each of you taps your favorite."}</p>
      <div class="small">Votes in: ${pg.votes.filter(v=>v!=null).length}/2</div>
      <button class="btn rose" id="A" style="margin-top:14px">🔥 ${esc(A?A.name:"A")}</button>
      <button class="btn rose" id="B">🔥 ${esc(B?B.name:"B")}</button>
    </div>
  </div>`);
  wrap.querySelector("#home").onclick=()=>route("home");
  const cast=(choice)=>{
    mutate(s=>{
      const p=s.game.positions;
      if(roomActive()){ p.votes[mySlot()]=choice; }
      else { const slot = p.votes[0]==null?0:1; p.votes[slot]=choice; }
    });
    const v=S.game.positions.votes;
    if(v[0]!=null && v[1]!=null){ resolveMatch(); }
    else if(!roomActive()){ toast("First vote in — pass the phone for the second 🗳️"); route("conquest"); }
    else { toast("Vote cast — waiting for partner."); route("conquest"); }
  };
  wrap.querySelector("#A").onclick=()=>cast("A");
  wrap.querySelector("#B").onclick=()=>cast("B");
  return wrap;
}

function resolveMatch(){
  const pg=S.game.positions;
  const round=pg.rounds[pg.roundIdx]; const match=round[pg.matchIdx];
  let winnerName;
  const [v0,v1]=pg.votes;
  if(v0===v1){ winnerName = v0==="A"?match[0]:match[1]; }
  else {
    // tie → active player breaks; flavor: caress-off, active picks
    winnerName = rand([match[0],match[1]]); // random tiebreak (both disagree)
    mutate(s=>{ s.game.positions.aligned=false; });
  }
  mutate(s=>{
    const p=s.game.positions;
    p.history.push({r:p.roundIdx, m:p.matchIdx, win:winnerName});
    p.voting=false; p.votes=[null,null];
    // advance match
    p.matchIdx++;
    if(p.matchIdx>=round.length){
      // build next round from winners
      const winners=round.map((m,mi)=>{
        const h=p.history.find(x=>x.r===p.roundIdx&&x.m===mi); return h?h.win:m[0];
      });
      if(winners.length===1){ p.champion=winners[0]; if(p.aligned) award(s,"aligned"); }
      else { const nr=[]; for(let i=0;i<winners.length;i+=2){ nr.push([winners[i], winners[i+1]!=null?winners[i+1]:null]); }
        p.rounds.push(nr); p.roundIdx++; p.matchIdx=0; }
    }
  });
  toast(`👑 ${winnerName} advances!`);
  route("conquest");
}
function roundLabel(matches, size){
  const teams=matches*2;
  if(teams<=2) return "The Final";
  if(teams<=4) return "Semifinals";
  if(teams<=8) return "Quarterfinals";
  return "Round 1";
}
function conquestVictory(){
  const pg=S.game.positions; const P=posByName(pg.champion);
  const wrap=$(`<div class="screen center">
    <div style="height:20px"></div>
    <div class="crown" style="font-size:70px">👑</div>
    <div class="title" style="font-size:26px">Royal Favorite</div>
    <div class="panel" style="margin-top:14px">
      <div class="nm" style="font-size:20px;font-weight:800;color:var(--gold)">${esc(pg.champion)}</div>
      ${P?`<div class="pips" style="color:var(--rose2);font-weight:800">${"🌶️".repeat(P.tier)}</div>
      <div class="ds small" style="margin-top:6px">${esc(P.desc)}</div>
      <div class="fl" style="font-style:italic;color:var(--gold);margin-top:8px">${esc(P.flavor)}</div>`:""}
    </div>
    <p class="muted" style="margin-top:14px">Crowned the realm's favorite. Saved to your Crown Jewels.</p>
    <button class="btn" id="again">Run another tournament</button>
    <button class="btn ghost" id="home">Throne Room</button>
  </div>`);
  // persist to crown jewels
  try{ const cj=JSON.parse(localStorage.getItem("sxc_crownjewels")||"[]");
    if(!cj.includes(pg.champion)){ cj.unshift(pg.champion); localStorage.setItem("sxc_crownjewels", JSON.stringify(cj.slice(0,12))); } }catch(e){}
  wrap.querySelector("#again").onclick=()=>route("conqueststart");
  wrap.querySelector("#home").onclick=()=>route("home");
  return wrap;
}

/* ===================================================================== *
 * ROYAL CODEX (browse positions)                                        *
 * ===================================================================== */
SCREENS.codex = ()=>{
  const lock=lockoutSet();
  const tiers=[[1,"Mild 🙂"],[2,"Medium 😏"],[3,"Spicy 🌶️"],[4,"Wild 🔥"]];
  let jewels=[]; try{ jewels=JSON.parse(localStorage.getItem("sxc_crownjewels")||"[]"); }catch(e){}
  const groups=tiers.map(([tier,lbl])=>{
    const ps=POSITIONS.filter(p=>p.tier===tier && !p.tags.some(t=>lock.has(t)));
    if(!ps.length) return "";
    return `<div class="codexgrp"><h4>${lbl}</h4>${ps.map(p=>`
      <div class="codexcard"><div class="row between"><div class="nm">${esc(p.name)}${jewels.includes(p.name)?" 👑":""}</div><div class="pips">${"🌶️".repeat(p.tier)}</div></div>
        <div class="ds">${esc(p.desc)}</div><div class="fl">${esc(p.flavor)}</div></div>`).join("")}</div>`;
  }).join("");
  const hidden=POSITIONS.filter(p=>p.tags.some(t=>lock.has(t))).length;
  const wrap=$(`<div class="screen">
    <div class="row between"><div class="pill" id="home">⌂ Throne Room</div><div class="pill">📜 Royal Codex</div></div>
    <div style="height:6px"></div>
    <h2 class="serif" style="color:var(--gold)">The Royal Codex</h2>
    <p class="small">${POSITIONS.length - hidden} positions in your realm${hidden?` · ${hidden} hidden by your hard limits`:""}. Browse freely — pure reference, no scoring.</p>
    ${jewels.length?`<div class="codexcard"><div class="nm">👑 Your Crown Jewels</div><div class="small">${jewels.map(esc).join(" · ")}</div></div>`:""}
    ${groups || `<p class="muted">Every position is filtered out by your current hard limits. Loosen one to see the Codex.</p>`}
    <button class="btn ghost sm" id="home2" style="margin-top:16px">Back to the Throne Room</button>
  </div>`);
  wrap.querySelector("#home").onclick=()=>route("home");
  wrap.querySelector("#home2").onclick=()=>route("home");
  return wrap;
};

/* ===================================================================== *
 * VICTORY (competitive modes)                                           *
 * ===================================================================== */
SCREENS.victory = ()=>{
  const [a,b]=S.players; if(!a||!b){ route("home"); return $("<div></div>"); }
  const win = (a.score||0)>=(b.score||0)?a:b; const lose=win===a?b:a;
  const titleByMode = S.game.mode==="roulette"?"High Roller of the Court":"Duelist";
  const wrap=$(`<div class="screen center">
    <div style="height:24px"></div>
    <div class="crown" style="font-size:70px">👑</div>
    <div class="title" style="font-size:30px">${esc(win.name)} is crowned</div>
    <div class="tag-line">${titleByMode}</div>
    <div class="scorebar" style="margin:22px 0">
      <div class="scorecard active"><div class="big">${win.crest}</div><div class="nm">${esc(win.name)}</div><div class="pts">${win.score||0}</div></div>
      <div class="scorecard"><div class="big">${lose.crest}</div><div class="nm">${esc(lose.name)}</div><div class="pts">${lose.score||0}</div></div>
    </div>
    <p class="muted">A hard-fought reign. The loser owes the winner one royal favor of their choosing. 😏</p>
    ${trophyBlock()}
    <button class="btn" id="keep">Play on (keep scores)</button>
    <button class="btn ghost" id="newreign">New reign (reset scores)</button>
  </div>`);
  wrap.querySelector("#keep").onclick=()=>route("home");
  wrap.querySelector("#newreign").onclick=()=>{ mutate(s=>{ s.players.forEach(p=>{ if(p){p.score=0;} }); s.game.achievements=[]; s.game._giggles=0; }); route("home"); };
  return wrap;
};

/* ===================================================================== *
 * SHARED VIEW FRAGMENTS                                                 *
 * ===================================================================== */
function cardFace(c){
  if(!c) return `<div class="qcard"><div class="qtext">You've explored it all — pass, or crown a winner.</div></div>`;
  const themeLine = c.flavor ? `<div class="qflavor">${esc(c.flavor)}</div>`
    : (c.tags&&c.tags.length ? `<div class="small" style="position:absolute;bottom:16px;left:20px;opacity:.65">${esc(c.tags.slice(0,3).join(" · "))}</div>` : "");
  return `<div class="qcard">
    <div class="qpts">+${c.pts||0} 👑</div>
    <div class="qcat">${esc(c.cat)}</div>
    <div class="qtext">${esc(c.text)}</div>
    ${themeLine}
  </div>`;
}
function miniScore(p,active){ if(!p) return `<div class="scorecard" style="padding:8px"><div class="nm">—</div></div>`;
  return `<div class="scorecard ${active?'active':''}" style="padding:8px">
    <div class="nm">${p.crest} ${esc(p.name)}</div><div class="pts" style="font-size:22px">${p.score||0}</div></div>`; }
function ringSVG(){
  return `<div class="ring"><svg width="74" height="74" viewBox="0 0 74 74">
    <circle cx="37" cy="37" r="32" stroke="rgba(255,255,255,.12)" stroke-width="6" fill="none"/>
    <circle id="ringFill" cx="37" cy="37" r="32" stroke="var(--rose)" stroke-width="6" fill="none" stroke-linecap="round"/>
    </svg><div class="t" id="ringTxt">30</div></div>`;
}
function waitingView(label){
  const partner=activePlayer(); const c=S.game.card;
  return $(`<div class="screen center">
    <div class="row between"><div class="pill" onclick="route('home')">⌂ Throne Room</div><div class="pill">${label}</div></div>
    <div class="scorebar" style="margin:12px 0 18px">
      ${miniScore(S.players[0],S.game.turn===0)}
      ${miniScore(S.players[1],S.game.turn===1)}
    </div>
    <div class="waitcrest">${partner?partner.crest:"👑"}</div>
    <h2 class="serif" style="color:var(--gold)">${esc(partner?partner.name:"Your partner")} is on a quest…</h2>
    ${c?`<div class="qcard" style="opacity:.85;margin-top:14px;text-align:left"><div class="qcat">${esc(c.cat)}</div><div class="qtext">${esc(c.text)}</div></div>`:""}
    <p class="muted" style="margin-top:16px"><span class="syncdot ${ROOM.live?'live':'off'}"></span>Sit back, your majesty. The crown will reach you here.</p>
  </div>`);
}

/* ===================================================================== *
 * SCORING SIDE-EFFECTS (achievements, streaks)                          *
 * ===================================================================== */
function bumpCard(s){
  s.game.cardCount=(s.game.cardCount||0)+1;
  if(s.game.cardCount>=20) award(s,"marathon");
}
function afterScore(s, picked){
  picked=picked||{};
  award(s,"first");
  if(picked.scream) award(s,"loud");
  if(picked.climax) award(s,"coronation");
  // full house: all four reaction types seen across the game
  s.game.reactSeen=s.game.reactSeen||{};
  REACTIONS.forEach(r=>{ if(picked[r.key]) s.game.reactSeen[r.key]=true; });
  if(REACTIONS.every(r=>s.game.reactSeen[r.key])) award(s,"fullhouse");
  s.game._giggles=(s.game._giggles||0)+(picked.giggle?1:0);
  if(s.game._giggles>=3) award(s,"jester");
  if(s.game.card && s.game.card.spice===4) award(s,"decree");
  // comeback (competitive modes)
  if(s.players[0]&&s.players[1]){
    const me=s.players[s.game.turn], them=s.players[s.game.turn^1];
    const lead=(me.score||0)-(them.score||0);
    if(s.game._wasBehind && lead>0) award(s,"comeback");
    s.game._wasBehind = ((them.score||0)-(me.score||0))>=50;
  }
}
function award(s,id){
  s.game.achievements=s.game.achievements||[];
  if(!s.game.achievements.includes(id)){
    s.game.achievements.push(id);
    const a=ACHS.find(x=>x.id===id);
    if(a) setTimeout(()=>toast(`🏆 Trophy: ${a.t}`), 650);
  }
}

/* ===================================================================== *
 * BOOT                                                                  *
 * ===================================================================== */
(function boot(){
  // deep-link join: #JOIN-XXXXXX
  const m=(location.hash||"").match(/^#JOIN-([A-Z0-9]{6})$/i);
  if(m && SYNC_ENABLED){
    history.replaceState(null,"",location.pathname);
    route("joincode");
    setTimeout(()=>{ const inp=document.getElementById("code"); if(inp){ inp.value=m[1].toUpperCase(); } },150);
    return;
  }
  route(bothReady() ? "home" : "splash");
})();
</script>
